# ১. এই পাইপলাইন বা ওয়ার্কফ্লো-র একটি নাম দিন
name: Next.js Dashboard CI Pipeline

# ২. কখন এই পাইপলাইনটি নিজে নিজে চালু হবে?
on:
  push:
    branches: [ main ] # যখনই আপনি main ব্রাঞ্চে কোড push করবেন
  pull_request:
    branches: [ main ] # অথবা main ব্রাঞ্চের জন্য কোনো Pull Request তৈরি করবেন

# ৩. গিটহাবের সার্ভার কী কী কাজ (Jobs) করবে?
jobs:
  test-and-build:
    # গিটহাবকে বলছি আমাদের কাজটা চালানোর জন্য উবুন্টু (Linux) অপারেটিং সিস্টেমের একটা ভার্চুয়াল কম্পিউটার দিতে
    runs-on: ubuntu-latest 

    # এখানে একটার পর একটা ধাপ (Steps) চলবে
    steps:
    
    # ধাপ-১: গিটহাবের ওই ভার্চুয়াল কম্পিউটারে আপনার 'dashboard' রিপোজিটরির কোডগুলো নিয়ে আসা (Clone করা)
    - name: Checkout Code
      uses: actions/checkout@v4

    # ধাপ-২: কোড রান করার জন্য কম্পিউটারে Node.js সেটআপ করা
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # আপনার কম্পিউটারের নোড ভার্সন অনুযায়ী (যেমন ২০ বা ২২)
        cache: 'npm' # বারবার প্যাকেজ ডাউনলোড না করে ক্যাশ করে রাখার জন্য, যাতে দ্রুত বিল্ড হয়

    # ্ম-৩: আপনার প্রজেক্টের সব ডিপেন্ডেন্সি বা প্যাকেজ ইন্সটল করা (আমরা নরমালি যেভাবে npm install দিই)
    - name: Install Dependencies
      run: npm ci # (npm ci হলো অটোমেশনের জন্য npm install এর চেয়ে দ্রুত এবং নিরাপদ কমান্ড)

    # ধাপ-৪: কোডে কোনো টাইপো, সিনট্যাক্স ভুল বা লিন্টিং এরর আছে কিনা তা চেক করা
    - name: Run Next.js Lint
      run: npm run lint

    # ধাপ-৫: প্রজেক্টটি সফলভাবে প্রোডাকশনের জন্য বিল্ড (npm run build) হচ্ছে কিনা পরীক্ষা করা
    - name: Run Next.js Build
      run: npm run build