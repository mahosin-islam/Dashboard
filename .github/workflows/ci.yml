name: Next.js Dashboard CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm' 

    - name: Install Dependencies
      run: npm ci 

    - name: Run Next.js Lint
      run: npm run lint

    - name: Run Next.js Build
      run: npm run build