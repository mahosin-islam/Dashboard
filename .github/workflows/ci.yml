name: Next.js Dashboard CI Pipeline

# ১. কখন এই পাইপলাইনটি নিজে নিজে চালু হবে?
on:
  push:
    branches: [ main ] # যখনই main ব্রাঞ্চে কোড push করবেন
  pull_request:
    branches: [ main ] # অথবা main ব্রাঞ্চের জন্য কোনো Pull Request তৈরি করবেন

# ২. গিটহাবের সার্ভার কী কী কাজ (Jobs) করবে?
jobs:
  test-and-build:
    runs-on: ubuntu-latest # গিটহাবের একটি ভার্চুয়াল কম্পিউটারে এটি চলবে

    steps:
    # ধাপ-১: গিটহাবের ওই কম্পিউটারে আপনার প্রজেক্টের কোডগুলো নিয়ে আসা
    - name: Checkout Code
      uses: actions/checkout@v4

    # ধাপ-২: কোড রান করার জন্য কম্পিউটারে Node.js সেটআপ করা
    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' 
        cache: 'npm' # বিল্ড প্রসেস দ্রুত করার জন্য ক্যাশ অন করা হলো

    # ধাপ-৩: আপনার প্রজেক্টের সব প্যাকেজ বা ডিপেন্ডেন্সি ইন্সটল করা
    - name: Install Dependencies
      run: npm ci 

    # ্ম-৪: প্রজেক্টটি সফলভাবে প্রোডাকশনের জন্য বিল্ড হচ্ছে কিনা পরীক্ষা করা
    - name: Run Next.js Build
      run: npm run build